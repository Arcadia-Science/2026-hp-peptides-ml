version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: detanet
      POSTGRES_USER: detanet
      POSTGRES_PASSWORD: detanet
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://detanet:detanet@postgres:5432/detanet
      REDIS_URL: redis://redis:6379/0
      MODEL_URL: http://model:8001
      PARQUET_DIR: /data/processed
      CACHE_TTL_SECONDS: 300
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - model
    volumes:
      - ./data/processed:/data/processed:ro

  model:
    build:
      context: ./apps/model
    environment:
      MODEL_CODE_DIR: /opt/detanet
      MODEL_DEVICE: cpu
    ports:
      - "8001:8001"
    volumes:
      - ./capsule-3259363/code:/opt/detanet:ro
